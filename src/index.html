<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>Moyo Header</title>

    <!-- Google Fonts: Roboto SOMENTE peso 500 -->
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@500&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="src/style.css"
    />
  </head>

  <body class="page">
    <header class="header">
      <div class="header-container">
        <!-- Logo (fora do nav) -->
        <a
          href="#"
          class="header-logo-link"
        >
          <img
            src="images/logo.png"
            alt="Logo Moyo"
            class="header-logo"
          />
        </a>

        <!-- Navegação -->
        <nav class="nav">
          <ul class="nav-list">
            <li class="nav-item">
              <a
                href="#"
                class="nav-link is-active"
              >
                Laptops
              </a>
            </li>

            <li class="nav-item">
              <a
                href="#"
                class="nav-link"
                data-qa="hover"
              >
                Phones
              </a>
            </li>

            <li class="nav-item">
              <a
                href="#"
                class="nav-link"
              >
                Tablets
              </a>
            </li>

            <li class="nav-item">
              <a
                href="#"
                class="nav-link"
              >
                Laptops &amp; Computers
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </header>
  </body>
</html>
